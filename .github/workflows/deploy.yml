name: Deploy MkDocs

# mainブランチにpushされた時だけ自動で動く
on:
  push:
    branches:
      - main

# 書き込み権限の付与
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python環境を準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: パッケージをインストール
        run: pip install -r requirements-docs.txt

      - name: MkDocsをビルドしてGitHub Pagesにデプロイ
        run: mkdocs gh-deploy --force